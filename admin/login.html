<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin | New Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/style.css">
    <link rel="icon" type="image/png" href="/assets/logo.png">
</head>
<body class="admin-login-body">
    <div class="login-glow"></div>
    <div class="login-card">
        <img src="/assets/logo.png" alt="New Server" class="login-logo">
        <h1>Painel <span class="gradient-text">Admin</span></h1>
        <p class="login-sub">Acesso restrito — New Server</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>
            <button type="submit" id="loginBtn">Entrar</button>
        </form>
        <p class="login-error hidden" id="loginError"></p>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('loginError');
        const btn = document.getElementById('loginBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Entrando...';

            try {
                const res = await fetch('/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();

                if (!res.ok || !data.success) {
                    throw new Error(data.message || 'Falha ao entrar.');
                }

                window.location.href = '/admin';
            } catch (err) {
                errorEl.textContent = err.message || 'Não foi possível entrar.';
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        });
    </script>
</body>
</html>
