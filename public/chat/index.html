<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Atendimento automático New Server IPTV: gere seu teste grátis e consulte o vencimento da sua conta em segundos.">
    <title>Atendimento New Server | Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/chat/style.css">
    <link rel="icon" type="image/png" href="/assets/logo.png">
</head>
<body>

    <div class="chat-page">
        <header class="chat-header">
            <img src="/assets/logo.png" alt="New Server" class="chat-logo">
            <div class="chat-header-text">
                <h1>Atendimento New Server</h1>
                <p class="live-status"><span class="live-dot"></span> Agente online agora</p>
            </div>
            <a href="https://wa.me/5579998130038" target="_blank" rel="noopener" class="btn btn-outline btn-sm chat-human-link">
                <i class="fa-brands fa-whatsapp"></i> Falar com humano
            </a>
        </header>

        <main class="chat-window" id="chatWindow">
            <!-- Mensagens injetadas via JS -->
        </main>

        <div class="typing-indicator hidden" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>

        <form class="chat-input-bar" id="chatForm">
            <input
                type="text"
                id="chatInput"
                placeholder="Digite sua mensagem..."
                autocomplete="off"
                required
            >
            <button type="submit" id="chatSendBtn" aria-label="Enviar mensagem">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>

        <p class="chat-disclaimer">Atendimento automatizado para testes grátis e consulta de conta. Para planos e suporte, fale com um humano pelo WhatsApp acima.</p>
    </div>

    <script src="/chat/chat.js"></script>
</body>
</html>
